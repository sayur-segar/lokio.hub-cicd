templates:
  # ─── CD Pipelines ───────────────────────────────────────────────────────────
  - name: cd-go
    description: "CD pipeline for Go services (Docker + multi-registry + multi-deploy)"
    path: cd-go.lokio
    output: .github/workflows/cd-<%= kebabCase(name) %>.yml
    parameters:
      - name: name
        type: string
        required: true
        prompt: "Service name (e.g. user-service):"

      - name: go_version
        type: string
        required: false
        prompt: "Go version:"
        default: "1.22"

      - name: branch
        type: string
        required: false
        prompt: "Branch to trigger CD (e.g. main):"
        default: "main"

      - name: registry
        type: options
        required: true
        prompt: "Container registry:"
        options:
          - ghcr
          - dockerhub
          - ecr
        default: ghcr

      - name: deploy_type
        type: options
        required: true
        prompt: "Deployment target:"
        options:
          - ssh
          - k8s
          - railway
          - fly
          - none
        default: ssh

      - name: has_tests
        type: boolean
        required: false
        prompt: "Run tests before deploy?"
        default: true

      - name: test_command
        type: string
        required: false
        prompt: "Test command:"
        default: "go test ./..."

      - name: has_migration
        type: boolean
        required: false
        prompt: "Run DB migrations on deploy?"
        default: false

      - name: port
        type: number
        required: false
        prompt: "Application port:"
        default: 8080

      - name: dockerfile_path
        type: string
        required: false
        prompt: "Dockerfile path:"
        default: "Dockerfile"

  - name: cd-bun
    description: "CD pipeline for Bun/Node services (Docker + multi-registry + multi-deploy)"
