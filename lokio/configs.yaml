# ─── Lokio Check ──────────────────────────────────────────────────────────────
# Verifies files conform to their template structure.
# Rules are derived from your .lokio templates — no manual regex needed.
#
# Run:  lokio check
# Pre-commit hook (.git/hooks/pre-commit):
#   #!/bin/sh
#   lokio check
#
check:
  danger_mode: block      # block | warn
  # templates:            # optional — omit to check ALL templates automatically
  #   - component

# ─── AI Standards Check ────────────────────────────────────────────────────────
# Add your API key to lokio.local.yaml (auto-added to .gitignore):
#   ai:
#     api_key: YOUR_KEY_HERE
#
ai:
  provider: gemini        # openai | anthropic | gemini | ollama | openrouter
  model: gemini-3.1-flash-lite-preview

standards:
  - id: unit-test
    description: "Every service must have a unit test file"
    severity: danger      # danger | warning
  - id: no-console-log
    description: "No console.log in production code"
    severity: warning
