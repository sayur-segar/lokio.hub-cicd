        default: "latest"

      - name: branch
        type: string
        required: false
        prompt: "Branch to trigger CD:"
        default: "main"

      - name: registry
        type: options
        required: true
        prompt: "Container registry:"
        options:
          - ghcr
          - dockerhub
          - ecr
        default: ghcr

      - name: deploy_type
        type: options
        required: true
